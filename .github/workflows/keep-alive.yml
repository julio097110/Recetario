name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 8 * * 1,4'  # lunes y jueves a las 8:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s "https://sentaokgxmshmpkfbtlc.supabase.co/rest/v1/recetas?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
